# Render Blueprint — deploys the FixEarn backend (NestJS API) + a managed
# Postgres. In Render: New > Blueprint, point at this repo. Set the secret env
# vars (marked sync:false) in the dashboard after the first deploy.
# Frontend is deployed separately on Vercel (see docs/DEPLOY.md).
databases:
  - name: fixearn-db
    plan: free
    databaseName: fixearn
    user: fixearn

services:
  - type: web
    name: fixearn-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      # Render injects PORT automatically; the app reads process.env.PORT.
      - key: DATABASE_URL
        fromDatabase:
          name: fixearn-db
          property: connectionString
      - key: STELLAR_NETWORK
        value: testnet
      - key: DEFINDEX_BASE_URL
        value: https://api.defindex.io
      - key: SOROBAN_RPC_URL
        value: https://soroban-testnet.stellar.org
      # Set this to your deployed web origin (Vercel), e.g. https://fixearn.vercel.app
      - key: CORS_ORIGIN
        sync: false
      # Secrets — set in the Render dashboard (never commit real values):
      - key: PRIVY_APP_ID
        sync: false
      - key: PRIVY_APP_SECRET
        sync: false
      - key: DEFINDEX_API_KEY
        sync: false
      - key: VAULT_ADDRESS
        sync: false
      - key: USDC_ADDRESS
        sync: false
